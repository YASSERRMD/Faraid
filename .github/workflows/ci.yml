name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Build, vet, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test with race detector and coverage
        run: go test ./... -race -coverprofile=coverage.out -covermode=atomic
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/v2.12.2/install.sh | sh -s -- -b "$(go env GOPATH)/bin" v2.12.2
      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m ./...

  invariants:
    name: Project invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true
      - name: Forbid em dash characters
        run: bash scripts/check-no-emdash.sh
      - name: Core isolation invariant
        run: bash scripts/check-core-isolation.sh
