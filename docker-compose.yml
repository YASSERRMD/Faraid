services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: faraid
      POSTGRES_PASSWORD: faraid
      POSTGRES_DB: faraid
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U faraid"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FARAID_ENV: development
      FARAID_HTTP_ADDR: ":8080"
      FARAID_LOG_LEVEL: info
      FARAID_LOG_FORMAT: json
      FARAID_DATABASE_URL: "postgres://faraid:faraid@db:5432/faraid"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      ORIGIN: "http://localhost"
    depends_on:
      api:
        condition: service_healthy

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web

volumes:
  db_data:
